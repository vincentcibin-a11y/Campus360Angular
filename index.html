<!DOCTYPE html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>

    <title>Campus360</title>
</head>

<body ng-controller="dashboardcontroller">

    <h1>{{collegename}}</h1>

    <input type="text" ng-model="collegename">

    <br><br>

    <input type="number" ng-model="totalstudent">
    <p>Total Students : {{totalstudent}}</p>

    <input type="number" ng-model="totalFaculty">
    <p>Total Faculty : {{totalFaculty}}</p>

    <button ng-click="totalstudent = totalstudent + 1">
        Increase Student Count
    </button>

    <hr>

    <h2>Add Student</h2>

    <input type="text"
           placeholder="Enter student name"
           ng-model="newStudent">

    <button ng-click="addstudent()">
        Add Student
    </button>

    <hr>

    <h2>Student List</h2>

    <button ng-click="showstudents = !showstudents">
        {{showstudents ? 'Hide Students' : 'Show Students'}}
    </button>

    <ul ng-show="showstudents">
        <li ng-repeat="student in students">
            {{student}}
        </li>
    </ul>

</body>

</html>
