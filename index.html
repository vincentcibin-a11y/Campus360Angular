<!DOCTYPE html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>

    <title>Campus360</title>
</head>

<body ng-controller="dashboardcontroller">
    <input type="text" name="" id="" ng-model="collegename">

    <h1>{{collegename}}</h1>
    <input type="number" name="" id="" ng-model="totalstudent">

    <p>Total Students:{{totalstudent}}</p>
    <input type="number" name="" id="" ng-model="totalFaculty">

    <p>Total Faculty:{{totalFaculty}}</p>
    <button class="btn btn-primary" ng-click="totalstudent = totalstudent + 1">
        Submit
    </button>
    <button ng-click="addstudent()">Add Student</button>
    <h2 class="">Student List</h2>
    <ul>
        <li class="ol" ng-repeat="student in students">{{student}}</li>
    </ul>

</body>

</html>
